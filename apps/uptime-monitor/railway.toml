# Railway IaC for the uptime monitor agent (one of N instances — the
# Railway-hosted EU one). Other instances run on internal servers via
# the same Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/uptime-monitor/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
